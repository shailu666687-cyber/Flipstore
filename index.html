<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipStore</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-container">
                <i class='bx bx-shopping-bag splash-logo'></i>
            </div>
            <h1 class="brand-name">FlipStore</h1>
            <p class="brand-subtitle">Inspired by Flipkart</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <header class="top-nav">
            <div class="brand">FlipStore</div>
            <div class="search-bar">
                <i class='bx bx-search'></i>
                <input type="text" placeholder="Search for products, brands and more">
            </div>
        </header>

        <main id="router-view">
            <div class="skeleton-loader"></div> 
        </main>

        <nav class="bottom-nav">
            <a href="#home" class="nav-item active">
                <i class='bx bx-home-alt'></i>
                <span>Home</span>
            </a>
            <a href="#categories" class="nav-item">
                <i class='bx bx-grid-alt'></i>
                <span>Categories</span>
            </a>
            <a href="#cart" class="nav-item cart-icon-container">
                <i class='bx bx-cart'></i>
                <span class="badge" id="cart-badge">0</span>
                <span>Cart</span>
            </a>
            <a href="#account" class="nav-item">
                <i class='bx bx-user'></i>
                <span>Account</span>
            </a>
        </nav>
    </div>

    <script src="config.js"></script>
    <script src="splash.js"></script>
    <script src="api.js"></script>
    </body>
</html>
