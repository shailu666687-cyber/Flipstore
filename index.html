<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipstore | Partner Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f1f3f6] text-gray-800 antialiased pb-20">

    <div id="toastContainer" class="fixed top-4 left-0 right-0 z-[100] flex flex-col items-center gap-2 pointer-events-none px-4"></div>

    <div id="appContainer">
        
        <header class="glass sticky top-0 z-40 px-4 pt-4 pb-3 shadow-sm border-b border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-lg italic">F</div>
                    <h1 class="font-bold text-xl tracking-tight text-blue-600 italic">Flipstore</h1>
                </div>
                <div class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-100 shadow-inner flex items-center gap-1">
                    <i class="fas fa-crown text-yellow-500"></i> Partner
                </div>
            </div>

            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="text" placeholder="Search brands, products..." class="w-full bg-white text-sm py-3 pl-10 pr-4 rounded-xl outline-none border border-gray-200 shadow-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
            </div>
        </header>

        <main class="p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-800 text-lg">Top Margin Deals</h2>
                <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">Curated</span>
            </div>
            <div class="grid grid-cols-2 gap-3" id="productGrid">
                </div>
        </main>

        <nav class="glass fixed bottom-0 left-0 right-0 border-t border-gray-200 flex justify-around items-center pb-safe pt-2 pb-2 z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.03)]">
            <button class="flex flex-col items-center gap-1 p-2 text-blue-600 transition-transform active:scale-95">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-semibold">Home</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="fas fa-chart-line text-xl"></i>
                <span class="text-[10px] font-medium">Earnings</span>
            </button>
            <button class="flex flex-col items-center gap-1 p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i class="far fa-user text-xl"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </button>
        </nav>
    </div>

    <div id="overlayBackdrop" class="fixed inset-0 bg-black/50 z-40 hidden backdrop-blur-sm transition-opacity" onclick="App.closeAllModals()"></div>

    <div id="checkoutSheet" class="fixed bottom-0 left-0 right-0 bg-[#f1f3f6] z-50 rounded-t-3xl transform translate-y-full transition-transform duration-300 ease-out flex flex-col max-h-[90vh]">
        <div class="flex justify-center pt-3 pb-1 shrink-0 bg-white rounded-t-3xl">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full"></div>
        </div>
        
        <div class="bg-white px-5 py-3 border-b flex justify-between items-center shrink-0">
            <h2 class="font-bold text-lg">Order Summary</h2>
            <button onclick="App.closeCheckout()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-600"><i class="fas fa-times"></i></button>
        </div>

        <div class="overflow-y-auto flex-1 p-4 space-y-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex gap-4" id="chkProductDetails"></div>
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-gray-700 text-sm"><i class="fas fa-map-marker-alt text-blue-600 mr-1"></i> Customer Details</h3>
                </div>
                <form id="addressForm" class="space-y-3">
                    <input type="text" id="custName" required placeholder="Customer Full Name" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    <input type="tel" id="custPhone" pattern="[0-9]{10}" required placeholder="10-Digit Mobile Number" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="custPin" required placeholder="Pincode" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors">
                        <input type="text" id="custCity" required placeholder="City" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors">
                    </div>
                    <textarea id="custAddress" rows="2" required placeholder="Full Address (House, Area, Street)" class="w-full bg-gray-50 border border-gray-200 py-3 px-4 rounded-xl text-sm outline-none focus:border-blue-500 focus:bg-white transition-colors resize-none"></textarea>
                </form>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 text-sm mb-3 border-b pb-2">Price Details</h3>
                <div class="flex justify-between text-sm text-gray-600 mb-2"><span>Selling Price</span><span id="chkPrice" class="font-medium">₹0</span></div>
                <div class="flex justify-between text-sm text-gray-600 mb-2"><span>Delivery Fee</span><span class="text-green-600 font-medium">FREE</span></div>
                <div class="flex justify-between text-sm text-green-700 bg-green-50 p-2 rounded-lg font-bold mb-2"><span>Your Margin Earned</span><span id="chkMargin">₹0</span></div>
                <div class="flex justify-between text-base font-black border-t pt-3 mt-1 text-gray-900"><span>Customer Pays</span><span id="chkTotal">₹0</span></div>
            </div>
        </div>

        <div class="bg-white p-4 border-t shadow-[0_-10px_20px_rgba(0,0,0,0.05)] shrink-0">
            <button id="btnPlaceOrder" onclick="App.placeOrder()" class="w-full bg-gradient-to-r from-[#ffc200] to-[#ffb000] text-black font-extrabold py-4 rounded-xl shadow-lg active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-base">
                Place Order
            </button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
